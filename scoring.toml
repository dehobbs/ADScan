# scoring.toml — ADScan Risk Score Configuration
# ---------------------------------------------------------------------------
# Scoring Model: ratio-based (earned / possible * 100)
#
#   Each check module declares a CHECK_WEIGHT (its maximum point contribution).
#   When a check passes cleanly, its full weight counts as "earned".
#   When findings are raised, deductions reduce the earned total.
#   Category and overall scores = earned / possible * 100.
#
# Priority order for resolving a finding's deduction (highest wins):
#   1. [overrides]        — exact match on finding title (case-sensitive)
#   2. [severity_weights] — match on finding severity tier
#   3. finding["deduction"] — hardcoded value in the check module itself
#
# Check weights by category (for reference)
# ---------------------------------------------------------------------------
# ADCS / PKI Vulnerabilities    check_adcs.py                weight=20
# Account Hygiene               check_account_hygiene.py     weight=20
#                               check_password_policy.py     weight=20
#                               check_shadow_credentials.py  (no weight — unweighted)
#                               check_sid_history.py         (no weight — unweighted)
# Deprecated Operating Systems  check_deprecated_os.py       weight=20
# Domain Hygiene                check_domain_controllers.py  weight=20
#                               check_domain_trusts.py       weight=20
#                               check_gpo.py                 weight=8
#                               check_gpp_cpassword.py       weight=20
#                               check_legacy_frs_sysvol.py   weight=10
#                               check_misc_hardening.py      weight=15
#                               check_optional_features.py   weight=10
#                               check_pre_windows_2000.py    (no weight — unweighted)
#                               check_replication.py         weight=10
# Groups Hygiene                check_foreign_security_principals.py  weight=20
# Kerberos                      check_constrained_delegation.py  weight=20
#                               check_kerberos.py            weight=20
#                               check_rbcd_domain_dcs.py     (no weight — unweighted)
#                               check_rc4_encryption.py      (no weight — unweighted)
#                               check_unconstrained_delegation.py  weight=25
# Network Hygiene               check_dns_infrastructure.py  weight=15
#                               check_orphaned_subnets.py    weight=0  (info-only)
# Privileged Accounts           check_acl_permissions.py     weight=25
#                               check_adminsdholder_acl.py   weight=20
#                               check_laps.py                weight=20
#                               check_laps_coverage.py       weight=20
#                               check_privileged_accounts.py weight=20
#                               check_protected_admin_users.py  (no weight — unweighted)
#                               check_protected_users_group.py  (no weight — unweighted)
#                               check_service_accounts.py    (no weight — unweighted)
# Protocol Security             check_legacy_protocols.py    weight=15
#                               check_protocol_security.py   (no weight — unweighted)
#                               check_smb.py                 weight=15
# ---------------------------------------------------------------------------

[severity_weights]
# Default deduction per severity tier — applied when no per-title override exists.
# These mirror the baseline values hardcoded in check modules.
critical = 20
high     = 15
medium   = 8
low      = 5
info     = 0

# ---------------------------------------------------------------------------
# [overrides] — Active overrides for findings whose hardcoded deductions
# diverge from the severity_weights defaults above.
#
# Without these entries the engine would fall back to severity_weights, which
# would under- or over-count those findings relative to what each check module
# intends.  These are NOT optional tuning — they are required for correctness.
# ---------------------------------------------------------------------------

[overrides]

# ---------------------------------------------------------------------------
# Kerberos — Unconstrained Delegation  (check_unconstrained_delegation.py)
# ---------------------------------------------------------------------------
# Both findings carry higher deductions than their severity-tier defaults.
# User accounts are the highest-risk path (full credential theft via TGT
# capture); computer accounts enable printer-spooler / coerce-auth attacks.
"User Accounts with Unconstrained Delegation"     = 25  # critical tier — elevated +5 above default (25 vs 20)
"Computer Accounts with Unconstrained Delegation"  = 20  # high tier    — elevated +5 above default (20 vs 15)

# ---------------------------------------------------------------------------
# Privileged Accounts — ACL / Permissions  (check_acl_permissions.py)
# ---------------------------------------------------------------------------
# DCSync rights on the domain object grant full credential replication — the
# single most dangerous AD misconfiguration; warranting an above-default score.
# RBCD is slightly elevated because it enables Kerberos relay chains.
"DCSync Rights Detected on Domain Object"                 = 25  # critical tier — elevated to 25 (vs default 20)
"Resource-Based Constrained Delegation (RBCD) Configured"  = 10  # medium tier  — elevated to 10 (vs default 8)

# ---------------------------------------------------------------------------
# Domain Hygiene — Legacy FRS SYSVOL  (check_legacy_frs_sysvol.py)
# ---------------------------------------------------------------------------
# FRS is deprecated but is not an immediate exploitation path; deductions are
# intentionally lower than severity-tier defaults to reflect operational
# (not security-critical) risk.
"SYSVOL Replication: FRS in use — migration to DFSR not started" = 10  # high tier — reduced to 10 (vs default 15)
"SYSVOL Replication: DFSR Redirected — FRS still present"        = 3   # low tier  — reduced to 3  (vs default 5)

# ---------------------------------------------------------------------------
# Domain Hygiene — Optional Features / Replication
# ---------------------------------------------------------------------------
# Slightly above severity defaults to reflect their operational impact.
"AD Recycle Bin Not Enabled"               = 10  # medium tier — elevated to 10 (vs default 8)
"Excessive Site Link Replication Intervals" = 10  # medium tier — elevated to 10 (vs default 8)

# ---------------------------------------------------------------------------
# Privileged Accounts — Service Accounts  (check_service_accounts.py)
# ---------------------------------------------------------------------------
"User Accounts Used as Service Accounts (No gMSA Adoption)" = 10  # medium tier — elevated to 10 (vs default 8)

# ---------------------------------------------------------------------------
# RC4 / Legacy Kerberos Encryption  (check_rc4_encryption.py)
# ---------------------------------------------------------------------------
# The check module uses graduated deductions that are intentionally lower
# than severity-tier defaults to reflect real-world deployment constraints.
# Uncomment only if you want to diverge from the module's own values.
# "DES Encryption Enabled: N account(s)"                — dynamic title, cannot override
# "RC4 Permitted on Domain Controllers: N DC(s)"        — dynamic title, cannot override
# "RC4 Permitted on Admin Accounts: N account(s)"       — dynamic title, cannot override
# "RC4 Permitted on Service Accounts: N account(s)"     — dynamic title, cannot override
# Module uses: DES=15 (critical), RC4-DCs=10 (high), RC4-Admins=8 (high), RC4-Svc=8 (medium)

